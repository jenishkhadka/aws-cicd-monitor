<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pipeline Status Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #0d1117;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    h1 { font-size: 2rem; margin-bottom: 30px; }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 24px;
      width: 100%;
      max-width: 500px;
      margin-bottom: 16px;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 10px;
    }
    .pulse-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .pulse-dot.ok {
      background: #2ea043;
      box-shadow: 0 0 0 0 rgba(46,160,67,0.7);
      animation: pulse-green 1.5s infinite;
    }
    .pulse-dot.down {
      background: #f85149;
      box-shadow: 0 0 0 0 rgba(248,81,73,0.7);
      animation: pulse-red 1.5s infinite;
    }
    @keyframes pulse-green {
      0% { box-shadow: 0 0 0 0 rgba(46,160,67,0.7); }
      70% { box-shadow: 0 0 0 10px rgba(46,160,67,0); }
      100% { box-shadow: 0 0 0 0 rgba(46,160,67,0); }
    }
    @keyframes pulse-red {
      0% { box-shadow: 0 0 0 0 rgba(248,81,73,0.7); }
      70% { box-shadow: 0 0 0 10px rgba(248,81,73,0); }
      100% { box-shadow: 0 0 0 0 rgba(248,81,73,0); }
    }
    #status-text { font-size: 1.4rem; font-weight: bold; }
    #response-time { color: #8b949e; font-size: 0.9rem; margin-top: 4px; }
    #uptime { color: #8b949e; font-size: 0.9rem; margin-top: 4px; }
    #timestamp { color: #8b949e; font-size: 0.85rem; margin-top: 8px; }
    .badge-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .badge-row span { font-size: 0.9rem; color: #8b949e; }
    .history-title {
      font-size: 0.85rem;
      color: #8b949e;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #21262d;
      font-size: 0.85rem;
    }
    .history-item:last-child { border-bottom: none; }
    .tag {
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: bold;
    }
    .tag.ok { background: #1a7f37; color: #fff; }
    .tag.down { background: #b91c1c; color: #fff; }
    .history-ms { color: #8b949e; }
    .countdown {
      text-align: center;
      color: #8b949e;
      font-size: 0.8rem;
      margin-top: 8px;
    }
    .countdown span {
      color: #79c0ff;
      font-weight: bold;
    }
    .footer {
      margin-top: 40px;
      text-align: center;
      padding: 20px;
      color: #8b949e;
      font-size: 0.9rem;
    }
    .footer a {
      color: #79c0ff;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s ease;
    }
    .footer a:hover {
      color: #add8ff;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1> CI/CD Pipeline Dashboard</h1>

  <!-- Status Card -->
  <div class="card">
    <div class="status-row">
      <div class="pulse-dot" id="pulse-dot"></div>
      <div id="status-text">Checking...</div>
    </div>
    <div id="response-time">Last deployed: —</div>
    <div id="uptime">Uptime: —</div>
    <div id="timestamp">Last checked: —</div>
  </div>

  <!-- Pipeline Badge Card -->
  <div class="card">
    <div class="history-title">Pipeline Status</div>
    <div class="badge-row">
      <span id="custom-badge" style="
        display: inline-block;
        padding: 3px 10px;
        border-radius: 4px;
        font-size: 0.75rem;
        font-weight: bold;
        background: #6e7681;
        color: #fff;
      ">checking...</span>
      <span>Last GitHub Actions run</span>
    </div>
  </div>

  <!-- History Card -->
  <div class="card">
    <div class="history-title">Check History</div>
    <div id="history"></div>
  </div>

  <!-- Countdown -->
  <div class="countdown">Next check in: <span id="countdown">30</span>s</div>

  <script>
    const history = [];
    let deployedAt = null;
    let countdownValue = 30;

    function formatUptime(deployedTimestamp) {
      const now = new Date();
      const deployed = new Date(deployedTimestamp);
      const diffMs = now - deployed;

      const seconds = Math.floor(diffMs / 1000);
      const minutes = Math.floor(seconds / 60);
      const hours = Math.floor(minutes / 60);
      const days = Math.floor(hours / 24);

      if (days > 0) return `${days}d ${hours % 24}h ${minutes % 60}m`;
      if (hours > 0) return `${hours}h ${minutes % 60}m ${seconds % 60}s`;
      if (minutes > 0) return `${minutes}m ${seconds % 60}s`;
      return `${seconds}s`;
    }

    async function checkStatus() {
      const dot = document.getElementById("pulse-dot");
      const statusText = document.getElementById("status-text");
      const responseTimeEl = document.getElementById("response-time");
      const uptimeEl = document.getElementById("uptime");
      const timestampEl = document.getElementById("timestamp");
      const historyEl = document.getElementById("history");
      const badge = document.getElementById("custom-badge");
      const time = new Date().toLocaleTimeString();

      try {
        const res = await fetch("./status.json?t=" + Date.now());
        const data = await res.json();
        const isHealthy = data.status === "healthy";
        deployedAt = data.timestamp;

        if (isHealthy) {
          dot.className = "pulse-dot ok";
          statusText.textContent = "✅ Server is HEALTHY";
          responseTimeEl.textContent = "Last deployed: " + new Date(data.timestamp).toLocaleString();
          uptimeEl.textContent = "Uptime: " + formatUptime(data.timestamp);
          badge.textContent = "passing";
          badge.style.background = "#238636";
          history.unshift({ status: "ok", time });
        } else {
          dot.className = "pulse-dot down";
          statusText.textContent = "❌ Server is DOWN";
          responseTimeEl.textContent = "Last deployed: " + new Date(data.timestamp).toLocaleString();
          uptimeEl.textContent = "Uptime: —";
          badge.textContent = "failing";
          badge.style.background = "#b91c1c";
          history.unshift({ status: "down", time });
        }
      } catch {
        dot.className = "pulse-dot down";
        statusText.textContent = "❌ Status Unknown";
        responseTimeEl.textContent = "Could not read status.json";
        uptimeEl.textContent = "Uptime: —";
        badge.textContent = "unknown";
        badge.style.background = "#6e7681";
        history.unshift({ status: "down", time });
      }

      timestampEl.textContent = "Last checked: " + time;
      if (history.length > 5) history.pop();
      historyEl.innerHTML = history.map(h => `
        <div class="history-item">
          <span>${h.time}</span>
          <span class="history-ms">—</span>
          <span class="tag ${h.status}">${h.status === "ok" ? "HEALTHY" : "DOWN"}</span>
        </div>
      `).join("");

      countdownValue = 30;
    }

    // Uptime ticker — updates every second
    setInterval(() => {
      if (deployedAt) {
        const uptimeEl = document.getElementById("uptime");
        uptimeEl.textContent = "Uptime: " + formatUptime(deployedAt);
      }
    }, 1000);

    // Countdown ticker
    setInterval(() => {
      countdownValue--;
      if (countdownValue < 0) countdownValue = 0;
      document.getElementById("countdown").textContent = countdownValue;
    }, 1000);

    checkStatus();
    setInterval(checkStatus, 30000);
  </script>

 <!-- Footer -->
  <div class="footer">
    <a href="https://github.com/jenishkhadka/aws-cicd-monitor" target="_blank" style="display:inline-flex;align-items:center;gap:6px;">
      Full Deployment Guide <span style="transition:transform 0.2s;" onmouseover="this.style.transform='translateX(4px)'" onmouseout="this.style.transform='translateX(0)'">→</span>
    </a>
  </div>
</body>
</html>
