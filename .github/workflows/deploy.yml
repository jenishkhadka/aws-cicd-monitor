name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest test_app.py -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "$EC2_KEY" > key.pem
          chmod 600 key.pem
          scp -i key.pem -o StrictHostKeyChecking=no \
            app.py requirements.txt ec2-user@$EC2_HOST:~/app/
          ssh -i key.pem -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=10 \
            ec2-user@$EC2_HOST \
            "pip3 install -r ~/app/requirements.txt && \
             pkill gunicorn || true && sleep 1 && \
             nohup gunicorn -w 2 -b 0.0.0.0:5000 app:app \
             --chdir /home/ec2-user/app \
             --daemon \
             --pid /tmp/gunicorn.pid \
             --log-file /home/ec2-user/app/app.log"